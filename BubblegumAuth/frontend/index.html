<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BubblegumAuth</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bubbles.css">
    <link rel="stylesheet" href="css/animations.css">

</head>

<body>

<div id="background-bubbles"></div>

<header>

<a href="/index.html" class="backButton">
← Portfolio
</a>

<h1>BubblegumAuth</h1>

<p>

Experimental Authentication Research

</p>

</header>

<main>

<div class="bubble registerBubble">

    <h2>Register</h2>

    <input
        id="username"
        type="text"
        placeholder="Username"
    >

    <input
        id="password"
        type="password"
        placeholder="Password"
    >

    <button id="registerButton">

        Create Bubble

    </button>

    <button id="loginButton">

        Login

    </button>

</div>
<p
    id="bubblePrompt"
    class="bubblePrompt">

Waiting to generate authentication bubble...

</p>

<div class="bubble loginBubble">

<h2>Authentication Bubble</h2>

<div class="ascii-container">

    <canvas id="asciiCanvas"></canvas>

</div>

<p class="bubblePrompt">
Waiting to generate authentication bubble...
</p>

</div>

<div class="bubble demoBubble">

<h2>Demonstration</h2>

<div class="flow">

Password

↓

Stretch

↓

Mutate

↓

ASCII Bubble

↓

Authenticate

↓

POP

</div>

</div>

</main>

<script type="module" src="js/app.js"></script>

</body>

</html>
